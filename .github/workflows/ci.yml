name: QATRA CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: "QATRA environment profile"
        required: false
        default: "local"
        type: choice
        options:
          - local
          - dev
          - staging
          - prod

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: qatra-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  QATRA_ENV: ${{ github.event.inputs.environment || 'local' }}
  QATRA_BROWSER: chrome
  QATRA_HEADLESS: "true"
  MAVEN_OPTS: "-Xmx2048m -Dfile.encoding=UTF-8"

jobs:
  validate:
    name: Validate project structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Validate Maven modules
        run: mvn -B -ntp validate

  api-tests:
    name: API module tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run qatra-api tests
        run: |
          mvn -B -ntp -pl qatra-api -am clean test \
            -Dqatra.env=${{ env.QATRA_ENV }} \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qatra-api-test-reports
          path: |
            qatra-api/target/surefire-reports
            qatra-api/target/allure-results
          if-no-files-found: ignore
          retention-days: 14

  web-tests:
    name: Web module tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run qatra-web sample tests headless
        run: |
          mvn -B -ntp -pl qatra-web -am clean test \
            -Dtest=SampleQatraTest \
            -Dqatra.env=${{ env.QATRA_ENV }} \
            -Dqatra.browser=${{ env.QATRA_BROWSER }} \
            -Dqatra.headless=${{ env.QATRA_HEADLESS }} \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload Web evidence and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qatra-web-evidence
          path: |
            qatra-web/target/surefire-reports
            qatra-web/target/allure-results
            qatra-web/target/qatra-reports
          if-no-files-found: ignore
          retention-days: 14

  parallel-web-tests:
    name: Parallel web smoke
    runs-on: ubuntu-latest
    needs: web-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run qatra-web parallel profile
        run: |
          mvn -B -ntp -pl qatra-web -am test -Pparallel-web \
            -Dqatra.env=${{ env.QATRA_ENV }} \
            -Dqatra.browser=${{ env.QATRA_BROWSER }} \
            -Dqatra.headless=${{ env.QATRA_HEADLESS }} \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload parallel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qatra-parallel-web-evidence
          path: |
            qatra-web/target/surefire-reports
            qatra-web/target/allure-results
            qatra-web/target/qatra-reports
          if-no-files-found: ignore
          retention-days: 14

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Package without rerunning tests
        run: mvn -B -ntp package -DskipTests

      - name: Upload built JARs
        uses: actions/upload-artifact@v4
        with:
          name: qatra-built-jars
          path: "**/target/*.jar"
          if-no-files-found: error
          retention-days: 14
