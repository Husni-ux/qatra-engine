# Production smoke profile - keep it safe and read-only
qatra.env.name=Production
qatra.env.description=Production smoke validation profile
qatra.browser=chrome
qatra.headless=true
qatra.base.url=https://example.com
qatra.api.base.url=https://example.com/api
qatra.timeout.element=20
qatra.timeout.pageload=60
qatra.rtl.quality-gate.min-score=90
qatra.config.required=qatra.base.url,qatra.api.base.url
qatra.rtl.baseline.update=false
