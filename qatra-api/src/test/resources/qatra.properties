# QATRA API test configuration
# Override from command line: -Dqatra.env=staging
qatra.env=local
qatra.config.profile-file-pattern=qatra-%s.properties
qatra.config.validate-on-startup=false
qatra.config.required=
qatra.config.env-overrides=true
qatra.config.mask-secrets=true

qatra.api.base.url=
qatra.api.timeout.seconds=10
qatra.api.relaxed.https=true
qatra.api.log.request=true
qatra.api.log.response=true
qatra.api.attach.request=true
qatra.api.attach.response=true
